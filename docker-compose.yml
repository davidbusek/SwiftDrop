version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: swiftdrop_db
    environment:
      POSTGRES_USER: swiftdrop_user
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: swiftdrop_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: